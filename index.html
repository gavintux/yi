                                <div className="p-6 bg-stone-50 rounded-2xl border border-stone-100 hover:border-forest-200 transition-colors">

                                    rel="noreferrer"

                                    <div className="text-sm font-bold text-stone-400 uppercase tracking-wide group-hover:text-forest-600 transition-colors flex items-center gap-2">

                                    </div>
                                </a>

                <footer id="garden" className="bg-gradient-to-br from-forest-900 to-forest-800 text-forest-50 py-20 px-6">

                                <Tent size={36} className="text-green-300" />
                            </div>
                            <span className="text-3xl font-bold tracking-tight">林光章 (Zen)</span>
                        </div>
                        
                        <div className="flex flex-col md:flex-row justify-center items-center gap-8 md:gap-16 mb-16">
                            <a href="mailto:linkczen@gmail.com" className="flex items-center gap-3 hover:text-white transition-all hover:scale-105 opacity-80 hover:opacity-100">
                                <Mail size={22} />
                                <span className="text-lg">linkczen@gmail.com</span>
                            </a>
                            <a href="mailto:zen@naes.ilc.edu.tw" className="flex items-center gap-3 hover:text-white transition-all hover:scale-105 opacity-80 hover:opacity-100">

                                <span className="text-lg">zen@naes.ilc.edu.tw</span>

                        <div className="border-t border-forest-700/50 pt-10 flex flex-col md:flex-row justify-between items-center text-sm text-forest-300/60">
                            <p>© {new Date().getFullYear()} Zen Lin. All rights reserved.</p>
                            <p className="mt-2 md:mt-0 font-medium tracking-wide">Education • Open Source • Nature</p>
                        </div>
                    </div>
                </footer>

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Portfolio />);
